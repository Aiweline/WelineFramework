name: Verify HTTP endpoints (draft)

# Example GitHub Actions job snippet. Adapt to your CI system and secrets management.
jobs:
  verify-http:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up jq
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Run HTTP verification
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          ORIGINAL_MODEL_ID: ${{ secrets.ORIGINAL_MODEL_ID }}
          CHECK_MODEL_ID: ${{ secrets.CHECK_MODEL_ID }}
        run: |
          chmod +x specs/001-app-code-weline/ci-verify-http.sh
          specs/001-app-code-weline/ci-verify-http.sh

      - name: Upload verification logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: http-verify-logs
          path: ./


