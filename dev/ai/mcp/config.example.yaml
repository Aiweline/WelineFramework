# Weline Project Intelligence MCP is local-only. Keep API keys in environment variables.
data_dir: ~/.learning-mcp
mode: local

collector:
  redact_secrets: true
  allow_cross_project: false
  max_event_bytes: 8388608

analysis:
  # The local Codex CLI extracts bounded, redacted session learning without an
  # API key. Use none for correction-only deterministic analysis, or openai
  # only after reviewing docs/SECURITY.md and configuring both model fields.
  provider: codex
  api_key_env: OPENAI_API_KEY
  base_url: https://api.openai.com/v1
  extractor_model: ""
  verifier_model: ""
  max_session_tokens: 50000
  request_timeout: 60s
  require_non_model_evidence_for_technical_rules: true
  automatic_learning:
    enabled: true
    # Strong user intent or a successful test/build/lint/browser/runtime result
    # can validate non-conflicting knowledge only after scope classification and
    # distinct positive/negative examples are complete. Global promotion stays manual.
    auto_validate: true
    max_candidates: 6
    max_existing_experiences: 100
    max_project_matches: 12
    duplicate_similarity: 0.86
    related_similarity: 0.55
    conflict_similarity: 0.62
    project_duplicate_similarity: 0.9
    minimum_validation_confidence: 0.9

retrieval:
  minimum_status: validated
  max_items: 5
  token_budget: 1800
  include_candidates: false

promotion:
  automatic: false
  allowed_targets:
    - repository_knowledge
    - agents_md_proposal
    - skill_proposal
    - test_proposal

privacy:
  raw_retention: 90d
  redact_before_model: true

scheduler:
  # Long-running learningd uses this poll interval.
  poll_interval: 10s
  # Active sessions are analyzed incrementally after this idle period,
  # even when Codex has not emitted Stop.
  session_idle_after: 15m
  # learningctl scheduler install uses this launchd interval on macOS.
  launchd_interval: 10m
  max_attempts: 5
  lease: 2m
  # Stop queues work and forks a short one-shot PHP worker.
  auto_process_on_stop: true

# Persistent per-project code, documentation, symbol, skill, FTS, sparse-vector, and compressed content index.
# The first build reads eligible Git files; subsequent queries and batch content reads use the database.
# SessionStart and PostToolUse schedule non-blocking incremental refreshes; MCP edits reindex exact paths immediately.
index:
  enabled: true
  auto_refresh: true
  # A local PHP Unix-socket sidecar coalesces Hook refreshes and exits after 15 idle minutes.
  # It starts automatically and falls back to the one-shot refresher when unavailable.
  sidecar_enabled: true
  # Codex writes refresh immediately; this is only the fallback for changes made outside Hook/MCP.
  refresh_interval: 60s
  max_file_bytes: 524288
  max_chunk_chars: 6000
  context_token_budget: 6000
  vector_dimensions: 2048
  # Keep only the highest-weight sparse terms per chunk; 24 bounds large-repo storage.
  vector_max_terms: 24
  # Warm read settings for the persistent SQLite index; mmap is virtual and demand-paged.
  sqlite_mmap_bytes: 268435456
  sqlite_cache_kib: 16384
  include_tests: false
  allowed_extensions:
    - php
    - phtml
    - md
    - markdown
    - txt
    - json
    - yaml
    - yml
    - xml
    - toml
    - ini
    - csv
    - sql
    - js
    - jsx
    - ts
    - tsx
    - vue
    - css
    - scss
    - less
    - html
    - htm
    - sh
    - bash
    - zsh
    - go
    - py
    - java
    - kt
    - rs
    - c
    - cc
    - cpp
    - h
    - hpp
    - proto
  excluded_paths:
    - .git/**
    - .gitnexus/**
    - .codex/code-intelligence/**
    - vendor/**
    - **/vendor/**
    - node_modules/**
    - **/node_modules/**
    - generated/**
    - var/**
    - pub/static/**
    - pub/media/**
    - **/view/tpl/**
    - **/static/libs/**
    - dev/ai/archive/**
    - **/test/**
    - **/tests/**
    - **/Test/**
    - **/*.min.*
    - **/*.map

# Compact writes keep the two-phase boundary locally: apply_compact_edit seals, applies, validates, reindexes, and can roll back without returning the one-time token to the model.
editing:
  enabled: true
  ticket_ttl: 10m
  max_files: 20
  max_file_bytes: 1048576
  max_total_bytes: 4194304
  allowed_roots:
    - app/code
    - dev/ai/mcp
  denied_paths:
    - .git/**
    - .codex/**
    - .agents/**
    - .gitnexus/**
    - vendor/**
    - **/vendor/**
    - generated/**
    - var/**
    - pub/static/**
    - pub/media/**
    - **/view/tpl/**
    - **/.env
    - **/.env.*
    - **/auth.json
    - **/*.pem
    - **/*.key
    - app/etc/env.php

knowledge:
  auto_generate_skills: true
  auto_doc_sync: false
  generated_skill_status: validated
  learning_skills:
    # Explicitly enabled for this installed local MCP: reviewed experience is grouped by
    # read-only Codex, rendered into project and owning-module marker boundaries, indexed,
    # and prompt-routed without scanning skill directories.
    enabled: true
    # Empty keeps the existing Weline behavior: project skills go to dev/ai/skills
    # and matching app/code modules receive module-local projections.
    # Set a repository-relative directory (for example .codex/skills) or an
    # absolute directory to emit only project-level skills there. The environment
    # variable LEARNING_MCP_SKILL_OUTPUT_DIR overrides this value.
    output_directory: ""
    minimum_confidence: 0.9
    max_experiences: 100
    max_skills: 12
    max_module_skill_projections: 64
    inject_on_prompt: true
    prompt_skill_limit: 3
    prompt_token_budget: 2400
  codex:
    # Enabled for strict doc-sync.v1, session-learning.v1, and learning-skills.v1 planning. The child remains ephemeral/read-only.
    enabled: true
    # Leave empty to use CODEX_CLI_PATH, PATH, or the ChatGPT.app bundled CLI.
    binary: ""
    model: ""
    timeout: 120s
    max_context_chars: 60000
