name: Publish Multica Skills

on:
  push:
    branches:
      - dev
    paths:
      - "dev/ai/skills/**"
      - "tools/publish-multica-skills.mjs"
      - ".github/workflows/publish-multica-skills.yml"
  workflow_dispatch:

jobs:
  publish-clawhub:
    runs-on: ubuntu-latest
    if: github.repository == 'Aiweline/WelineFramework'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify token
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "Missing CLAWHUB_TOKEN secret."
            exit 1
          fi

      - name: Publish role-based skills
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          CLAWHUB_OWNER: ${{ secrets.CLAWHUB_OWNER }}
          SKILL_VERSION: ${{ github.sha }}
        run: node tools/publish-multica-skills.mjs

      - name: Upload manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clawhub-skill-manifest
          path: tools/clawhub-skill-manifest.json
          if-no-files-found: ignore

  publish-skills-sh:
    runs-on: ubuntu-latest
    if: github.repository == 'Aiweline/WelineFramework'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Skills.sh
        env:
          GH_TOKEN: ${{ github.token }}
          SKILLS_SH_TAG: v1.0.${{ github.run_number }}
        run: node tools/publish-skills-sh.mjs
