openapi: 3.0.3
info:
  title: AI助手工具模块API
  description: WelineFramework AI助手工具模块的RESTful API接口
  version: 1.0.0
  contact:
    name: AI模块开发团队
    email: ai-support@weline.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost/api
    description: 开发环境
  - url: https://api.weline.com/v1
    description: 生产环境

security:
  - BearerAuth: []
  - TenantAuth: []

paths:
  # AI服务相关接口
  /ai/generate:
    post:
      tags:
        - AI服务
      summary: 生成AI内容
      description: 使用指定的AI模型生成文本内容
      operationId: generateAiContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
            examples:
              basic:
                summary: 基础生成请求
                value:
                  prompt: "请帮我写一个PHP函数"
                  model_code: "gpt-3.5-turbo"
                  scenario_code: "code_generation"
                  locale: "zh_CN"
              translation:
                summary: 翻译请求
                value:
                  prompt: "Hello, how are you?"
                  model_code: "gpt-3.5-turbo"
                  scenario_code: "translation"
                  params:
                    target_language: "中文"
                    source_language: "英文"
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 请求频率超限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ai/generate/stream:
    post:
      tags:
        - AI服务
      summary: 流式生成AI内容
      description: 使用流式方式生成AI内容，支持实时返回
      operationId: generateAiContentStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: 流式生成成功
          content:
            text/event-stream:
              schema:
                type: string
                format: binary

  /ai/models:
    get:
      tags:
        - AI模型管理
      summary: 获取AI模型列表
      description: 获取可用的AI模型列表
      operationId: getAiModels
      parameters:
        - name: active_only
          in: query
          description: 仅返回激活的模型
          required: false
          schema:
            type: boolean
            default: true
        - name: vendor
          in: query
          description: 按供应商过滤
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 模型列表获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'

  # 多租户管理接口
  /tenant/info:
    get:
      tags:
        - 多租户管理
      summary: 获取租户信息
      description: 获取当前租户的详细信息
      operationId: getTenantInfo
      security:
        - TenantAuth: []
      responses:
        '200':
          description: 租户信息获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantInfoResponse'

  /tenant/users:
    get:
      tags:
        - 多租户管理
      summary: 获取租户用户列表
      description: 获取租户下的用户列表
      operationId: getTenantUsers
      security:
        - TenantAuth: []
      parameters:
        - name: role
          in: query
          description: 按角色过滤
          required: false
          schema:
            type: string
            enum: [admin, member, viewer]
        - name: active_only
          in: query
          description: 仅返回激活用户
          required: false
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: 用户列表获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'

  /tenant/users:
    post:
      tags:
        - 多租户管理
      summary: 添加用户到租户
      description: 将用户添加到当前租户
      operationId: addUserToTenant
      security:
        - TenantAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserRequest'
      responses:
        '201':
          description: 用户添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # 国际化接口
  /i18n/content:
    get:
      tags:
        - 国际化
      summary: 获取翻译内容
      description: 根据内容键和语言代码获取翻译内容
      operationId: getI18nContent
      parameters:
        - name: key
          in: query
          description: 内容键
          required: true
          schema:
            type: string
        - name: locale
          in: query
          description: 语言代码
          required: true
          schema:
            type: string
            example: zh_CN
      responses:
        '200':
          description: 翻译内容获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/I18nContentResponse'

  /i18n/content:
    post:
      tags:
        - 国际化
      summary: 保存翻译内容
      description: 保存或更新翻译内容
      operationId: saveI18nContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/I18nContentRequest'
      responses:
        '201':
          description: 翻译内容保存成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/I18nContentResponse'

  # 移动端接口
  /mobile/devices:
    post:
      tags:
        - 移动端管理
      summary: 注册移动设备
      description: 注册用户的移动设备
      operationId: registerMobileDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '201':
          description: 设备注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'

  /mobile/notifications:
    post:
      tags:
        - 移动端管理
      summary: 发送推送通知
      description: 向用户发送推送通知
      operationId: sendPushNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationRequest'
      responses:
        '200':
          description: 通知发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'

  # 计费系统接口
  /billing/plans:
    get:
      tags:
        - 计费管理
      summary: 获取计费计划列表
      description: 获取可用的计费计划
      operationId: getBillingPlans
      responses:
        '200':
          description: 计费计划列表获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingPlanListResponse'

  /billing/invoices:
    get:
      tags:
        - 计费管理
      summary: 获取发票列表
      description: 获取租户的发票列表
      operationId: getBillingInvoices
      security:
        - TenantAuth: []
      parameters:
        - name: status
          in: query
          description: 按状态过滤
          required: false
          schema:
            type: string
            enum: [draft, pending, paid, overdue, cancelled, refunded]
        - name: limit
          in: query
          description: 限制返回数量
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          description: 偏移量
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 发票列表获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceListResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    TenantAuth:
      type: apiKey
      in: header
      name: X-Tenant-Code

  schemas:
    # 请求模式
    GenerateRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: 提示词
          example: "请帮我写一个PHP函数"
        model_code:
          type: string
          description: 模型代码
          example: "gpt-3.5-turbo"
        scenario_code:
          type: string
          description: 场景代码
          example: "code_generation"
        locale:
          type: string
          description: 语言代码
          example: "zh_CN"
        params:
          type: object
          description: 额外参数
          additionalProperties: true

    AddUserRequest:
      type: object
      required:
        - user_id
        - role
      properties:
        user_id:
          type: integer
          description: 用户ID
        role:
          type: string
          enum: [admin, member, viewer]
          description: 用户角色
        permissions:
          type: array
          items:
            type: string
          description: 权限列表

    I18nContentRequest:
      type: object
      required:
        - content_key
        - locale_code
        - content_value
      properties:
        content_key:
          type: string
          description: 内容键
        locale_code:
          type: string
          description: 语言代码
        content_value:
          type: string
          description: 内容值
        content_type:
          type: string
          enum: [prompt, response, error, label, message]
          description: 内容类型
        context:
          type: string
          description: 上下文

    RegisterDeviceRequest:
      type: object
      required:
        - device_id
        - device_type
      properties:
        device_id:
          type: string
          description: 设备ID
        device_type:
          type: string
          enum: [ios, android, web, desktop]
          description: 设备类型
        push_token:
          type: string
          description: 推送令牌
        device_info:
          type: object
          description: 设备信息
          additionalProperties: true

    SendNotificationRequest:
      type: object
      required:
        - user_id
        - title
        - content
      properties:
        user_id:
          type: integer
          description: 用户ID
        title:
          type: string
          description: 通知标题
        content:
          type: string
          description: 通知内容
        notification_type:
          type: string
          enum: [ai_response, system_alert, billing, security, marketing]
          description: 通知类型
        data:
          type: object
          description: 通知数据
          additionalProperties: true

    # 响应模式
    GenerateResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            content:
              type: string
              description: 生成的内容
            model:
              type: string
              description: 使用的模型
            usage:
              type: object
              properties:
                input_tokens:
                  type: integer
                  description: 输入Token数量
                output_tokens:
                  type: integer
                  description: 输出Token数量
                total_tokens:
                  type: integer
                  description: 总Token数量
            metadata:
              type: object
              description: 元数据
              additionalProperties: true

    ModelListResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            models:
              type: array
              items:
                $ref: '#/components/schemas/ModelInfo'
            total:
              type: integer
              description: 总数量

    ModelInfo:
      type: object
      properties:
        id:
          type: integer
          description: 模型ID
        vendor:
          type: string
          description: 供应商
        model_code:
          type: string
          description: 模型代码
        model_name:
          type: string
          description: 模型名称
        model_version:
          type: string
          description: 模型版本
        is_active:
          type: boolean
          description: 是否激活
        is_default:
          type: boolean
          description: 是否默认

    TenantInfoResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            tenant:
              $ref: '#/components/schemas/TenantInfo'
            users:
              type: object
              properties:
                total:
                  type: integer
                  description: 总用户数
                active:
                  type: integer
                  description: 激活用户数
            quota:
              type: object
              description: 资源配额
              additionalProperties: true

    TenantInfo:
      type: object
      properties:
        id:
          type: integer
          description: 租户ID
        name:
          type: string
          description: 租户名称
        code:
          type: string
          description: 租户代码
        type:
          type: string
          description: 租户类型
        status:
          type: string
          description: 租户状态
        plan:
          type: string
          description: 订阅计划

    UserListResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            users:
              type: array
              items:
                $ref: '#/components/schemas/UserInfo'
            total:
              type: integer
              description: 总数量

    UserInfo:
      type: object
      properties:
        id:
          type: integer
          description: 用户ID
        username:
          type: string
          description: 用户名
        email:
          type: string
          description: 邮箱
        role:
          type: string
          description: 角色
        is_active:
          type: boolean
          description: 是否激活
        created_time:
          type: string
          format: date-time
          description: 创建时间

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          $ref: '#/components/schemas/UserInfo'

    I18nContentResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            key:
              type: string
              description: 内容键
            locale:
              type: string
              description: 语言代码
            content:
              type: string
              description: 内容值
            context:
              type: string
              description: 上下文

    DeviceResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            id:
              type: integer
              description: 设备ID
            device_id:
              type: string
              description: 设备ID
            device_type:
              type: string
              description: 设备类型
            is_active:
              type: boolean
              description: 是否激活
            created_time:
              type: string
              format: date-time
              description: 创建时间

    NotificationResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            notification_id:
              type: integer
              description: 通知ID
            status:
              type: string
              description: 发送状态
            sent_time:
              type: string
              format: date-time
              description: 发送时间

    BillingPlanListResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            plans:
              type: array
              items:
                $ref: '#/components/schemas/BillingPlanInfo'
            total:
              type: integer
              description: 总数量

    BillingPlanInfo:
      type: object
      properties:
        id:
          type: integer
          description: 计划ID
        name:
          type: string
          description: 计划名称
        type:
          type: string
          description: 计划类型
        price:
          type: number
          description: 价格
        currency:
          type: string
          description: 货币
        billing_cycle:
          type: string
          description: 计费周期
        features:
          type: array
          items:
            type: string
          description: 功能列表
        limits:
          type: object
          description: 限制配置
          additionalProperties: true

    InvoiceListResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
        data:
          type: object
          properties:
            invoices:
              type: array
              items:
                $ref: '#/components/schemas/InvoiceInfo'
            total:
              type: integer
              description: 总数量

    InvoiceInfo:
      type: object
      properties:
        id:
          type: integer
          description: 发票ID
        invoice_number:
          type: string
          description: 发票号
        amount:
          type: number
          description: 金额
        currency:
          type: string
          description: 货币
        status:
          type: string
          description: 发票状态
        due_date:
          type: string
          format: date-time
          description: 到期日期
        paid_date:
          type: string
          format: date-time
          description: 支付日期
        created_time:
          type: string
          format: date-time
          description: 创建时间

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 是否成功
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: 错误代码
              example: "INVALID_REQUEST"
            message:
              type: string
              description: 错误消息
              example: "请求参数无效"
            details:
              type: string
              description: 错误详情
              example: "缺少必需的参数: prompt"
