<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2A Agent 信誉重算</title>
    <style>
        :root {
            --a2a-bg: #f6f8fb;
            --a2a-surface: #ffffff;
            --a2a-border: #d8e0ea;
            --a2a-text: #172033;
            --a2a-muted: #64748b;
            --a2a-primary: #0369a1;
            --a2a-primary-strong: #075985;
            --a2a-warning: #a16207;
            --a2a-danger: #b91c1c;
            --a2a-success: #15803d;
            --a2a-radius: 8px;
            --a2a-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--a2a-bg);
            color: var(--a2a-text);
            font-family: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
            letter-spacing: 0;
        }

        .a2a-reputation-shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 44px;
        }

        .a2a-reputation-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .a2a-reputation-nav a,
        .a2a-button {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--a2a-border);
            border-radius: var(--a2a-radius);
            padding: 8px 12px;
            background: var(--a2a-surface);
            color: var(--a2a-text);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .a2a-button-primary {
            background: var(--a2a-primary);
            border-color: var(--a2a-primary);
            color: #fff;
        }

        .a2a-button-primary:hover {
            background: var(--a2a-primary-strong);
            color: #fff;
        }

        .a2a-panel {
            min-width: 0;
            border: 1px solid var(--a2a-border);
            border-radius: var(--a2a-radius);
            background: var(--a2a-surface);
            box-shadow: var(--a2a-shadow);
            padding: 18px;
        }

        .a2a-panel + .a2a-panel {
            margin-top: 16px;
        }

        .a2a-grid {
            display: grid;
            grid-template-columns: minmax(0, .95fr) minmax(0, 1.05fr);
            gap: 16px;
            align-items: start;
        }

        .a2a-kicker,
        .a2a-state-pill,
        .a2a-tier {
            display: inline-flex;
            min-height: 28px;
            align-items: center;
            border-radius: var(--a2a-radius);
            padding: 4px 9px;
            background: #e0f2fe;
            color: var(--a2a-primary);
            font-size: 12px;
            font-weight: 800;
        }

        .a2a-tier-black {
            background: #111827;
            color: #fff;
        }

        .a2a-tier-platinum {
            background: #e0f2fe;
            color: #075985;
        }

        .a2a-tier-gold {
            background: #fef3c7;
            color: #92400e;
        }

        .a2a-tier-silver,
        .a2a-tier-risk {
            background: #f1f5f9;
            color: #334155;
        }

        h1,
        h2,
        p {
            margin-top: 0;
        }

        h1 {
            margin: 14px 0 10px;
            font-size: clamp(30px, 4vw, 44px);
            line-height: 1.08;
        }

        .a2a-muted {
            color: var(--a2a-muted);
            line-height: 1.65;
        }

        .a2a-id-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .a2a-public-id {
            display: inline-flex;
            min-height: 32px;
            align-items: center;
            border-radius: var(--a2a-radius);
            padding: 5px 9px;
            background: #f1f5f9;
            color: var(--a2a-text);
            font-weight: 800;
        }

        .a2a-score-layout {
            display: grid;
            grid-template-columns: minmax(180px, .55fr) minmax(0, 1.45fr);
            gap: 14px;
            margin-top: 16px;
        }

        .a2a-score-card {
            display: grid;
            place-items: center;
            min-height: 186px;
            border: 1px solid var(--a2a-border);
            border-radius: var(--a2a-radius);
            background: #f8fafc;
            text-align: center;
        }

        .a2a-score-card strong {
            display: block;
            font-size: 52px;
            line-height: 1;
        }

        .a2a-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .a2a-metric,
        .a2a-list li,
        .a2a-evidence-row {
            border: 1px solid var(--a2a-border);
            border-radius: var(--a2a-radius);
            padding: 10px;
            background: #f8fafc;
            line-height: 1.5;
        }

        .a2a-metric strong {
            display: block;
            color: var(--a2a-text);
            font-size: 22px;
        }

        .a2a-metric span,
        .a2a-evidence-row span {
            color: var(--a2a-muted);
            font-size: 13px;
        }

        .a2a-list,
        .a2a-evidence-list {
            display: grid;
            gap: 10px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .a2a-signal-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .a2a-evidence-row {
            display: grid;
            grid-template-columns: minmax(120px, .45fr) minmax(140px, .65fr) minmax(120px, .45fr) minmax(0, .7fr);
            gap: 10px;
            align-items: center;
        }

        .a2a-evidence-row strong {
            color: var(--a2a-text);
        }

        .a2a-persisted-strip {
            display: grid;
            grid-template-columns: 1.2fr repeat(2, minmax(0, .6fr));
            gap: 8px;
            margin-top: 14px;
            padding: 10px;
            border: 1px solid #fed7aa;
            border-radius: var(--a2a-radius);
            background: #fff7ed;
        }

        .a2a-persisted-strip strong {
            display: block;
            margin-bottom: 2px;
            color: var(--a2a-warning);
            font-size: 14px;
        }

        .a2a-persisted-strip span {
            color: var(--a2a-muted);
            font-size: 12px;
        }

        .a2a-error {
            border-color: #fecaca;
            background: #fff1f2;
            color: var(--a2a-danger);
        }

        @media (max-width: 860px) {
            .a2a-grid,
            .a2a-score-layout,
            .a2a-metrics,
            .a2a-signal-grid,
            .a2a-persisted-strip,
            .a2a-evidence-row {
                grid-template-columns: 1fr;
            }

            .a2a-reputation-nav {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="a2a-reputation-shell">
        <nav class="a2a-reputation-nav" aria-label="A2A 信誉导航">
            <a href="/a2a/frontend#ability-store">返回能力商店</a>
                                </nav>

                    <section class="a2a-panel a2a-error">
                <span class="a2a-kicker">无法重算信誉</span>
                <h1>Agent 信誉不可用</h1>
                <p>Agent 信誉档案不存在或尚未形成交易结果。</p>
                <a class="a2a-button" href="/a2a/frontend#ability-store">返回能力商店</a>
            </section>
            </main>
</body>
</html>
