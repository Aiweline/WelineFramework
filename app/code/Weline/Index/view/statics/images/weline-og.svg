  <text x="240" y="214" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#2563eb">PHP modular framework and WLS runtime</text>
  <text x="112" y="312" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#172033">Build modules, APIs, admin tools, storefronts, and multilingual sites.</text>
