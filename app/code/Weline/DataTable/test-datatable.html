<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataTable 测试页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 过滤器区域样式 */
        .datatable-filter-container {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .datatable-filter-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .datatable-filter-left {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .datatable-filter-right {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .datatable-filter-form {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-field {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .filter-field .form-control {
            min-width: 120px;
            max-width: 200px;
        }

        /* 表格头部样式 */
        .datatable-header-row {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .datatable-header-row th {
            border: none;
            padding: 0.75rem 0.5rem;
            font-weight: 600;
            color: #495057;
            vertical-align: middle;
        }

        .datatable-header-row th a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .datatable-header-row th a:hover {
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2>DataTable 测试页面</h2>
        
        <!-- 测试DataTable -->
        <div id="test-datatable" class="weline-datatable" data-model="WeShop\Store\Model\Store" data-scope="test-store-table">
            <div class="datatable-container">
                <!-- 过滤器区域 -->
                <div class="datatable-filter" id="test-datatable-filter">
                    <div class="datatable-filter-container">
                        <div class="datatable-filter-toolbar">
                            <div class="datatable-filter-left">
                                <div class="datatable-filter-form">
                                    <div class="filter-field">
                                        <input type="text" class="form-control form-control-sm" 
                                               id="filter-name" name="filter[name]" 
                                               data-field="name" placeholder="搜索名称" title="名称">
                                    </div>
                                    <div class="filter-field">
                                        <select class="form-control form-control-sm" 
                                                id="filter-status" name="filter[status]" 
                                                data-field="status" title="状态">
                                            <option value="">请选择</option>
                                            <option value="1">启用</option>
                                            <option value="0">禁用</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="datatable-filter-right">
                                <button type="button" class="btn btn-primary btn-sm" onclick="DataTableManager.applyFilters(DataTableManager.instances['test-datatable'])">
                                    <i class="fas fa-search"></i> 搜索
                                </button>
                                <button type="button" class="btn btn-secondary btn-sm" onclick="DataTableManager.resetFilters(DataTableManager.instances['test-datatable'])">
                                    <i class="fas fa-undo"></i> 重置
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 表格区域 -->
                <div class="datatable-body">
                    <div class="datatable-loading" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                    <div class="datatable-content">
                        <table class="table table-striped table-bordered">
                            <thead>
                                <tr class="datatable-header-row">
                                    <th data-field="store_id" data-sort-field="sort.store_id" style="width: 80px;">
                                        <a href="#">
                                            ID <i class="fa fa-sort"></i>
                                        </a>
                                    </th>
                                    <th data-field="name" data-sort-field="sort.name" style="width: 200px;">
                                        <a href="#">
                                            名称 <i class="fa fa-sort"></i>
                                        </a>
                                    </th>
                                    <th data-field="status" data-sort-field="sort.status" style="width: 100px;">
                                        <a href="#">
                                            状态 <i class="fa fa-sort"></i>
                                        </a>
                                    </th>
                                    <th data-field="address" data-sort-field="sort.address" style="width: 200px;">
                                        <a href="#">
                                            地址 <i class="fa fa-sort"></i>
                                        </a>
                                    </th>
                                    <th data-field="phone" data-sort-field="sort.phone" style="width: 120px;">
                                        <a href="#">
                                            电话 <i class="fa fa-sort"></i>
                                        </a>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 数据行将通过JavaScript动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="datatable-footer">
                    <div class="datatable-pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="view/statics/js/datatable-manager.js"></script>
    <script>
        $(document).ready(function() {
            // 初始化DataTable
            window.DataTableManager.initTable('#test-datatable', {
                model: 'WeShop\\Store\\Model\\Store',
                scope: 'test-store-table',
                editable: true,
                searchable: true,
                sortable: true,
                pageSize: 10,
                showPagination: true,
                showToolbar: true,
                showConfig: true
            });
        });
    </script>
</body>
</html>
