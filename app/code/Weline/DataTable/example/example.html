<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataTable 结构示例</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 过滤器区域样式 */
        .datatable-filter-container {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .datatable-filter-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .datatable-filter-left {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .datatable-filter-right {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .datatable-filter-form {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-field {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .filter-field .form-control {
            min-width: 120px;
            max-width: 200px;
        }

        /* 表格头部样式 */
        .datatable-header-row {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .datatable-header-row th {
            border: none;
            padding: 0.75rem 0.5rem;
            font-weight: 600;
            color: #495057;
            vertical-align: middle;
        }

        .datatable-header-row th a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .datatable-header-row th a:hover {
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2>DataTable 结构示例</h2>
        
        <!-- 过滤器区域 -->
        <div class="datatable-filter-container">
            <div class="datatable-filter-toolbar">
                <div class="datatable-filter-left">
                    <div class="datatable-filter-form">
                        <div class="filter-field">
                            <input type="text" class="form-control form-control-sm" 
                                   placeholder="搜索名称" title="名称">
                        </div>
                        <div class="filter-field">
                            <select class="form-control form-control-sm" title="状态">
                                <option value="">请选择</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <div class="filter-field">
                            <input type="date" class="form-control form-control-sm" title="创建时间">
                        </div>
                    </div>
                </div>
                <div class="datatable-filter-right">
                    <button type="button" class="btn btn-primary btn-sm">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm">
                        <i class="fas fa-undo"></i> 重置
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 表格区域 -->
        <div class="table-responsive">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr class="datatable-header-row">
                        <th style="width: 80px;">
                            <a href="#">
                                ID <i class="fa fa-sort"></i>
                            </a>
                        </th>
                        <th style="width: 200px;">
                            <a href="#">
                                名称 <i class="fa fa-sort"></i>
                            </a>
                        </th>
                        <th style="width: 100px;">
                            <a href="#">
                                状态 <i class="fa fa-sort"></i>
                            </a>
                        </th>
                        <th style="width: 150px;">
                            <a href="#">
                                创建时间 <i class="fa fa-sort"></i>
                            </a>
                        </th>
                        <th style="width: 120px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>示例数据1</td>
                        <td><span class="badge bg-success">启用</span></td>
                        <td>2024-01-01</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary">编辑</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>示例数据2</td>
                        <td><span class="badge bg-danger">禁用</span></td>
                        <td>2024-01-02</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary">编辑</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 分页区域 -->
        <nav aria-label="分页导航">
            <ul class="pagination justify-content-center">
                <li class="page-item disabled">
                    <a class="page-link" href="#" tabindex="-1">上一页</a>
                </li>
                <li class="page-item active">
                    <a class="page-link" href="#">1</a>
                </li>
                <li class="page-item">
                    <a class="page-link" href="#">2</a>
                </li>
                <li class="page-item">
                    <a class="page-link" href="#">3</a>
                </li>
                <li class="page-item">
                    <a class="page-link" href="#">下一页</a>
                </li>
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
