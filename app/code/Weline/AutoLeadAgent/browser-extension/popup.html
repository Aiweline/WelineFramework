<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLeadAgent 寻客助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            min-height: 200px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .container {
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }
        
        .title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .subtitle {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .status-card {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .status-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        
        .status-value {
            font-size: 16px;
            font-weight: 600;
        }
        
        .status-value.active {
            color: #4ade80;
        }
        
        .status-value.idle {
            color: #fbbf24;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 11px;
            opacity: 0.7;
        }
        
        .platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        
        .platform-tag {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }
        
        .footer {
            text-align: center;
            font-size: 11px;
            opacity: 0.6;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .footer a {
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎯</div>
            <div>
                <div class="title">AutoLeadAgent</div>
                <div class="subtitle">智能寻客助手 v1.0.0</div>
            </div>
        </div>
        
        <div class="status-card">
            <div class="status-label">扩展状态</div>
            <div class="status-value active" id="status">✓ 已激活</div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="crawlCount">0</div>
                <div class="stat-label">今日爬取</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="foundCount">0</div>
                <div class="stat-label">找到客户</div>
            </div>
        </div>
        
        <div class="status-card">
            <div class="status-label">支持的平台</div>
            <div class="platforms">
                <span class="platform-tag">LinkedIn</span>
                <span class="platform-tag">Twitter/X</span>
                <span class="platform-tag">Facebook</span>
                <span class="platform-tag">Instagram</span>
                <span class="platform-tag">YouTube</span>
            </div>
        </div>
        
        <div class="footer">
            <a href="#">Powered by WelineFramework</a>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
