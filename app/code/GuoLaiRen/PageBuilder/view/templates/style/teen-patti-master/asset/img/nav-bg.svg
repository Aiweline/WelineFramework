<svg width="1600" height="200" viewBox="0 0 1600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nav-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14062f"/>
      <stop offset="55%" stop-color="#2a0b52"/>
      <stop offset="100%" stop-color="#0b1a3a"/>
    </linearGradient>
    <radialGradient id="nav-spot" cx="80%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7a2bff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a2bff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="nav-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M0 0 L48 0 L48 48" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="nav-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="200" fill="url(#nav-base)"/>
  <rect width="1600" height="200" fill="url(#nav-grid)"/>
  <circle cx="1220" cy="60" r="160" fill="url(#nav-spot)" filter="url(#nav-blur)"/>

  <path d="M0 150 C 260 120 560 200 980 150 C 1200 124 1400 110 1600 130 L1600 200 L0 200 Z"
        fill="#3b116e" opacity="0.45"/>
  <path d="M0 18 H1600" stroke="#f6cf6b" stroke-width="2" opacity="0.5"/>
  <path d="M0 182 H1600" stroke="#8b5cff" stroke-width="2" opacity="0.35"/>

  <g opacity="0.35">
    <rect x="140" y="40" width="90" height="120" rx="10" fill="none" stroke="#ffffff" stroke-width="2"
          transform="rotate(-8 185 100)"/>
    <rect x="190" y="46" width="90" height="120" rx="10" fill="none" stroke="#f6cf6b" stroke-width="2"
          transform="rotate(-8 235 106)"/>
    <circle cx="1440" cy="120" r="46" fill="none" stroke="#f6cf6b" stroke-width="4" stroke-dasharray="10 8"/>
    <circle cx="1440" cy="120" r="32" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="8 6"/>
  </g>
</svg>
