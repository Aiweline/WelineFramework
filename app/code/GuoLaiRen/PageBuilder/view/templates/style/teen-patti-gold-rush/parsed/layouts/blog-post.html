<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Head content rendered by $this->renderHead() -->
    
    <!-- Article structured data (JSON-LD) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "Post Title",
        "description": "Post summary",
        "datePublished": "2024-01-01",
        "dateModified": "2024-01-01",
        "author": {
            "@type": "Person",
            "name": "Author Name"
        }
    }
    </script>
</head>
<body class="page-blog page-blog-post">
    <!-- Header Region (继承自首页) -->
    <header class="site-header" data-region="header">
        <!-- Inherited from home page -->
    </header>
    
    <!-- Main Content Region -->
    <main class="site-content blog-content" data-region="content">
        <div class="blog-container blog-post-container">
            <!-- blog-detail component -->
            <div class="tpmst-component-wrapper" data-component="blog-detail">
                <div class="blog-detail-wrapper">
                    <!-- Main article area -->
                    <article class="blog-article">
                        <!-- Article header -->
                        <header class="article-header">
                            <div class="article-categories">
                                <a href="#" class="category-link">Category</a>
                            </div>
                            <h1 class="article-title">Post Title</h1>
                            <div class="article-meta">
                                <span class="meta-author">By Author Name</span>
                                <span class="meta-date">January 1, 2024</span>
                                <span class="meta-reading-time">5 min read</span>
                            </div>
                        </header>
                        
                        <!-- Featured image -->
                        <div class="article-featured-image">
                            <img src="..." alt="Post featured image">
                        </div>
                        
                        <!-- Article content -->
                        <div class="article-content">
                            <p>Article content goes here...</p>
                        </div>
                        
                        <!-- Tags -->
                        <div class="article-tags">
                            <span class="tags-label">Tags:</span>
                            <a href="#" class="tag">Tag 1</a>
                            <a href="#" class="tag">Tag 2</a>
                        </div>
                        
                        <!-- Share buttons -->
                        <div class="article-share">
                            <span class="share-label">Share:</span>
                            <a href="#" class="share-btn facebook">Facebook</a>
                            <a href="#" class="share-btn twitter">Twitter</a>
                            <a href="#" class="share-btn linkedin">LinkedIn</a>
                        </div>
                    </article>
                    
                    <!-- Related posts -->
                    <section class="related-posts">
                        <h2>Related Posts</h2>
                        <div class="related-posts-grid">
                            <!-- Related post cards -->
                        </div>
                    </section>
                    
                    <!-- Sidebar -->
                    <aside class="blog-sidebar">
                        <!-- Categories, recent posts, etc. -->
                    </aside>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer Region (继承自首页) -->
    <footer class="site-footer" data-region="footer">
        <!-- Inherited from home page -->
    </footer>
    
    <!-- Footer scripts -->
</body>
</html>
